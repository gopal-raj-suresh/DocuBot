version: 2
updates:
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps-py)"
      include: scope
    groups:
      python-minor:
        update-types:
          - patch
          - minor
      python-major:
        update-types:
          - major

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps-js)"
      include: scope
    groups:
      npm-minor:
        update-types:
          - patch
          - minor
      npm-major:
        update-types:
          - major

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps-ci)"
    groups:
      actions-all:
        patterns:
          - "*"
