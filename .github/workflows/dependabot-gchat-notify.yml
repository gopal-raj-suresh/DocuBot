name: Notify Google Chat on Dependabot Events

on:
  pull_request_target:
    types: [opened, closed]
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Post Dependabot event to Google Chat
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Classify event and update type
        id: classify
        env:
          FM_UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          UPDATE_TYPE="${FM_UPDATE_TYPE}"

          if [[ -z "$UPDATE_TYPE" || "$UPDATE_TYPE" == "null" ]]; then
            if [[ "$PR_TITLE" =~ ([0-9]+)\.([0-9]+)\.([0-9]+).*to.*([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              OLD_MAJOR="${BASH_REMATCH[1]}"; OLD_MINOR="${BASH_REMATCH[2]}"
              NEW_MAJOR="${BASH_REMATCH[4]}"; NEW_MINOR="${BASH_REMATCH[5]}"
              if [[ "$OLD_MAJOR" != "$NEW_MAJOR" ]]; then
                UPDATE_TYPE="version-update:semver-major"
              elif [[ "$OLD_MINOR" != "$NEW_MINOR" ]]; then
                UPDATE_TYPE="version-update:semver-minor"
              else
                UPDATE_TYPE="version-update:semver-patch"
              fi
            else
              UPDATE_TYPE="unknown"
            fi
          fi

          EVENT="skip"
          if [[ "$ACTION" == "opened" ]]; then
            if [[ "$UPDATE_TYPE" == "version-update:semver-major" ]]; then
              EVENT="opened_major"
            else
              EVENT="opened_minor_patch"
            fi
          elif [[ "$ACTION" == "closed" && "$MERGED" == "true" ]]; then
            EVENT="merged"
          fi

          # Friendly update-type label
          case "$UPDATE_TYPE" in
            version-update:semver-patch) UPDATE_LABEL="patch update";;
            version-update:semver-minor) UPDATE_LABEL="minor update";;
            version-update:semver-major) UPDATE_LABEL="MAJOR version";;
            *) UPDATE_LABEL="update";;
          esac

          echo "event=$EVENT" >> "$GITHUB_OUTPUT"
          echo "update-type=$UPDATE_TYPE" >> "$GITHUB_OUTPUT"
          echo "update-label=$UPDATE_LABEL" >> "$GITHUB_OUTPUT"

      - name: Send Google Chat card (threaded per repo)
        if: steps.classify.outputs.event != 'skip'
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          EVENT: ${{ steps.classify.outputs.event }}
          UPDATE_LABEL: ${{ steps.classify.outputs.update-label }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DIRECTORY: ${{ steps.meta.outputs.directory }}
          PREVIOUS_VERSION: ${{ steps.meta.outputs.previous-version }}
          NEW_VERSION: ${{ steps.meta.outputs.new-version }}
          DEP_GROUP: ${{ steps.meta.outputs.dependency-group }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          # Friendly ecosystem name
          case "$ECOSYSTEM" in
            npm_and_yarn) ECO_LABEL="npm";;
            pip) ECO_LABEL="pip";;
            github_actions) ECO_LABEL="GitHub Actions";;
            docker) ECO_LABEL="Docker";;
            *) ECO_LABEL="$ECOSYSTEM";;
          esac

          LOCATION="${ECO_LABEL}"
          if [[ -n "$DIRECTORY" && "$DIRECTORY" != "/" ]]; then
            LOCATION="${ECO_LABEL} (${DIRECTORY})"
          fi

          # Version change text
          if [[ -n "$PREVIOUS_VERSION" && -n "$NEW_VERSION" ]]; then
            VERSION_TEXT="${PREVIOUS_VERSION} → ${NEW_VERSION}"
          else
            VERSION_TEXT="see PR for versions"
          fi

          # Package summary — single vs group
          if [[ -n "$DEP_GROUP" ]]; then
            PKG_COUNT=$(echo "$DEP_NAMES" | tr ',' '\n' | wc -l | tr -d ' ')
            PKG_SUMMARY="${DEP_GROUP} group (${PKG_COUNT} packages)"
          else
            PKG_SUMMARY="${DEP_NAMES}"
          fi

          case "$EVENT" in
            opened_minor_patch)
              HEADER_EMOJI="✅"
              HEADER_TITLE="Safe update — auto-merging after CI"
              DETAIL_LABEL="Change"
              DETAIL_TEXT="${PKG_SUMMARY} in ${LOCATION}<br>Bumping ${VERSION_TEXT} (${UPDATE_LABEL})"
              NEXT_LABEL="Next step"
              NEXT_TEXT="No action needed from you."
              BUTTON_TEXT="View PR"
              ;;
            opened_major)
              HEADER_EMOJI="⚠️"
              HEADER_TITLE="Major update — please review"
              DETAIL_LABEL="Change"
              DETAIL_TEXT="${PKG_SUMMARY} in ${LOCATION}<br>Bumping ${VERSION_TEXT} — <b>may include breaking changes</b>"
              NEXT_LABEL="Action required"
              NEXT_TEXT="Someone from the team, please review the PR and merge if safe."
              BUTTON_TEXT="Review PR"
              ;;
            merged)
              HEADER_EMOJI="🚀"
              HEADER_TITLE="Merged into main"
              DETAIL_LABEL="Change"
              DETAIL_TEXT="${PKG_SUMMARY} in ${LOCATION}<br>${VERSION_TEXT}"
              NEXT_LABEL="Status"
              if [[ -n "$MERGED_BY" && "$MERGED_BY" != "null" ]]; then
                NEXT_TEXT="Merged by ${MERGED_BY}."
              else
                NEXT_TEXT="Merged automatically after CI passed."
              fi
              BUTTON_TEXT="View PR"
              ;;
          esac

          SUBTITLE="${REPO} · PR #${PR_NUMBER}"

          THREAD_KEY=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          THREADED_URL="${WEBHOOK_URL}&threadKey=${THREAD_KEY}&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"

          cat > payload.json <<EOF
          {
            "cardsV2": [{
              "cardId": "dependabot-${EVENT}-$(date +%s)",
              "card": {
                "header": {
                  "title": "${HEADER_EMOJI} ${HEADER_TITLE}",
                  "subtitle": "${SUBTITLE}",
                  "imageUrl": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                  "imageType": "CIRCLE"
                },
                "sections": [{
                  "widgets": [
                    {"decoratedText": {"topLabel": "${DETAIL_LABEL}", "text": "${DETAIL_TEXT}", "wrapText": true}},
                    {"decoratedText": {"topLabel": "${NEXT_LABEL}", "text": "${NEXT_TEXT}", "wrapText": true}},
                    {"buttonList": {"buttons": [
                      {"text": "${BUTTON_TEXT}", "onClick": {"openLink": {"url": "${PR_URL}"}}}
                    ]}}
                  ]
                }]
              }
            }]
          }
          EOF
          curl -sS -X POST "$THREADED_URL" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -d @payload.json
